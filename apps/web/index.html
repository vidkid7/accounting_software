<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#2563EB" />
    <meta name="description" content="Accounting, billing, inventory & POS system with Nepal (NPR, VAT, Bikram Sambat) support." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/logo.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;500&family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Accounting System / लेखापरी</title>
    <script>
      // Sync <html lang> with persisted language so screen readers & fonts behave correctly.
      try {
        var raw = localStorage.getItem('acc-lang');
        var lang = raw ? (JSON.parse(raw).state || {}).lang : null;
        if (lang === 'ne' || lang === 'en') document.documentElement.lang = lang;
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
