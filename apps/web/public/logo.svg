<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="#2563EB"/>
  <!-- Book/Ledger base -->
  <rect x="14" y="18" width="36" height="30" rx="3" fill="white" opacity="0.95"/>
  <!-- Ledger spine -->
  <line x1="32" y1="18" x2="32" y2="48" stroke="#2563EB" stroke-width="2"/>
  <!-- Left page lines -->
  <line x1="19" y1="26" x2="29" y2="26" stroke="#93C5FD" stroke-width="2" stroke-linecap="round"/>
  <line x1="19" y1="31" x2="27" y2="31" stroke="#93C5FD" stroke-width="2" stroke-linecap="round"/>
  <line x1="19" y1="36" x2="29" y2="36" stroke="#93C5FD" stroke-width="2" stroke-linecap="round"/>
  <!-- Right page: upward bar chart -->
  <rect x="37" y="34" width="4" height="10" rx="1" fill="#2563EB" opacity="0.7"/>
  <rect x="43" y="28" width="4" height="16" rx="1" fill="#2563EB" opacity="0.85"/>
  <rect x="49" y="24" width="4" height="20" rx="1" fill="#2563EB"/>
  <!-- Rupee symbol accent (₹) -->
  <text x="32" y="14" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="white">₹</text>
</svg>
